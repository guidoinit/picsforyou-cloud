server:
  port: 10980

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_storage_api
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:cloud_api}
    password: ${DB_PASSWORD:cloud_api_pass}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
  mail:
    host: smtps.aruba.it
    port: 465
    username: info@picsforyou.cloud
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false

stripe:
  secret-key: ${STRIPE_SECRET_KEY}

paypal:
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  mode: ${PAYPAL_MODE:sandbox}

app:
  storage:
    directory: ./storage
    gcs:
      enabled: true
      bucket: picsforall
      credentials-path: ${GCS_CREDENTIALS_PATH:picsforall-service-account-key.json}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
  session:
    max-age-hours: 24
